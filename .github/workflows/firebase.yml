name: Deploy to Firebase

on:
  push:
    branches:
      - main
      - '**'        # run on every branch push (for previews)
  pull_request:
    branches:
      - '**'        # run on PRs too
  workflow_dispatch:  # allow manual runs from the Actions tab
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine changed areas
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            functions:
              - 'functions/**'
            hosting:
              - 'public/**'
              - 'firebase.json'
              - '.firebaserc'
              - 'index.html'
              - 'mobile.html'
              - 'detect.html'
              - 'app.js'
              - 'styles.css'

      - name: Debug paths-filter outputs
        run: |
          echo "functions changed? -> ${{ steps.changes.outputs.functions }}"
          echo "hosting   changed? -> ${{ steps.changes.outputs.hosting }}"
          echo "Changed files vs previous commit:"
          git --no-pager diff --name-only HEAD~1 HEAD || true


      - name: Show repo tree (top level)
        run: ls -la

      - name: Print firebase.json and .firebaserc if present
        run: |
          test -f firebase.json && echo "=== firebase.json ===" && cat firebase.json || echo "firebase.json NOT FOUND"
          test -f .firebaserc  && echo "=== .firebaserc  ===" && cat .firebaserc  || echo ".firebaserc NOT FOUND"

      # Run functions npm install ONLY if functions/** changed
      - name: Functions deps (if functions/ changed)
        if: steps.changes.outputs.functions == 'true'
        run: |
          echo "Installing functions deps…"
          cd functions
          if [ -f package.json ]; then
            npm install --no-audit --no-fund
          else
            echo "functions/package.json NOT FOUND"; exit 2
          fi

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Write service account key
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_POETRY_PLEASE }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Secret FIREBASE_SERVICE_ACCOUNT_POETRY_PLEASE is EMPTY or missing"; exit 3
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > $RUNNER_TEMP/gcloud-key.json
          echo "Key written to $RUNNER_TEMP/gcloud-key.json"

      - name: Firebase whoami / projects (sanity)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcloud-key.json
        run: |
          firebase --version
          firebase projects:list --json || true
          firebase use poetry-please || true

      # Deploy HOSTING (always)
      - name: Deploy Hosting (debug)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcloud-key.json
        run: |
          if [ -f firebase.json ]; then
            echo "Deploying HOSTING…"
            firebase --project poetry-please deploy --only hosting --debug
          else
            echo "Skipping hosting: firebase.json missing"; exit 4
          fi


      # Deploy FUNCTIONS only when functions/** changed
      - name: Deploy Functions (debug)
        if: steps.changes.outputs.functions == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcloud-key.json
        run: |
          echo "Deploying FUNCTIONS…"
          firebase --project poetry-please deploy --only functions --debug


            # ------------------------------------------------------------
  # DEPLOY PREVIEW CHANNEL for non-main branches
  # ------------------------------------------------------------
  deploy_preview:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Write service account key
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_POETRY_PLEASE }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Secret FIREBASE_SERVICE_ACCOUNT_POETRY_PLEASE is EMPTY or missing"; exit 3
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > $RUNNER_TEMP/gcloud-key.json
          echo "Key written to $RUNNER_TEMP/gcloud-key.json"

      - name: Deploy Hosting Preview (branch channel)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcloud-key.json
        run: |
          BRANCH="${{ github.ref_name }}"
          firebase hosting:channel:deploy "$BRANCH" --project poetry-please --expires 7d

