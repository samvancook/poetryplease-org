<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Poetry, Please — Detect</title>
  <meta name="robots" content="noindex,noarchive">
  <style>
    body { margin:0; font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    .wrap { max-width: 640px; margin: 18vh auto; padding: 16px; color:#333; }
    .hint { opacity:.7; font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    Routing you to the right experience… <span class="hint" id="why"></span>
    <noscript>Please enable JavaScript.</noscript>
  </div>

  <script>
    // --- Query param overrides: /?view=mobile or /?view=desktop
    const qp = new URLSearchParams(location.search);
    const view = (qp.get('view') || '').toLowerCase();
    if (view === 'mobile') location.replace('/mobile.html');
    else if (view === 'desktop') location.replace('/index.html');
    else {
      // --- Heuristics for mobile
      const MOBILE_BREAKPOINT = 900; // px on short side
      const ua = (navigator.userAgent || navigator.vendor || '').toLowerCase();
      const isUAMobile = /(android|iphone|ipod|blackberry|bb10|mini|mobile|windows phone)/i.test(ua);
      const isIPad = /ipad/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const hasUADataMobile = (navigator.userAgentData && navigator.userAgentData.mobile) === true;
      const coarse = matchMedia('(pointer:coarse)').matches && matchMedia('(hover:none)').matches;
      const smallSide = Math.min(screen.width || 0, screen.height || 0);
      const isSmallScreen = smallSide && smallSide <= MOBILE_BREAKPOINT;

      const probablyMobile = hasUADataMobile || isUAMobile || isIPad || (coarse && isSmallScreen);

      // Optional breadcrumb for debugging
      try {
        document.getElementById('why').textContent =
          probablyMobile ? '(mobile heuristics matched)' : '(desktop heuristics matched)';
      } catch (_) {}

      location.replace(probablyMobile ? '/mobile.html' : '/index.html');
    }
  </script>
</body>
</html>
