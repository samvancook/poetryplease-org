<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Poetry, Please — Detect</title>
  <meta name="robots" content="noindex,noarchive">
  <meta http-equiv="Cache-Control" content="no-store" />
  <style>
    body { margin:0; font:14px/1.4 system-ui,-apple-system,Segoe UI,Roboto,Arial; }
    .wrap { max-width:640px; margin:18vh auto; padding:16px; color:#333; }
    .hint { opacity:.7; font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    Routing you to the right experience… <span class="hint" id="why"></span>
    <noscript>Please enable JavaScript.</noscript>
  </div>

  <script>
    (function () {
      const url = new URL(location.href);
      const q = (k) => (url.searchParams.get(k) || '').toLowerCase();

      // Explicit overrides (either style is accepted)
      const forced =
        (q('desktop') === '1' || q('view') === 'desktop') ? 'desktop' :
        (q('mobile')  === '1' || q('view') === 'mobile')  ? 'mobile'  :
        null;

      // Simple UA-based heuristic (stable + reliable)
      const isMobileUA =
        (navigator.userAgentData && navigator.userAgentData.mobile === true) ||
        /\b(Android|iPhone|iPad|iPod|Windows Phone)\b/i.test(navigator.userAgent || '');

      const target = forced || (isMobileUA ? 'mobile' : 'desktop');

      // Optional breadcrumb for quick sanity checks
      try {
        document.getElementById('why').textContent =
          forced ? `(forced: ${forced})` : (isMobileUA ? '(mobile UA)' : '(desktop UA)');
      } catch (_) {}

      // Use Hosting rewrites
      location.replace(target === 'mobile' ? '/m' : '/app');
    })();
  </script>
</body>
</html>
