<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Author Profile | Poetry, Please</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <style>
    :root {
      --paper: #f7f3ea;
      --ink: #1d1a16;
      --muted: #6b6458;
      --line: #dad0c1;
      --card: rgba(255, 253, 248, 0.9);
      --accent: #2f5d62;
      --accent-soft: #d7e7e9;
      --warn: #8a3b2f;
      --ok: #2f6b44;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(47, 93, 98, 0.12), transparent 35%),
        linear-gradient(180deg, #faf7f0 0%, var(--paper) 100%);
    }
    .shell {
      max-width: 1040px;
      margin: 0 auto;
      padding: 28px 20px 64px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .topbar a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    h1 {
      margin: 18px 0 8px;
      font-size: clamp(34px, 6vw, 56px);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }
    .lede {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 68ch;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 22px 60px rgba(24, 19, 12, 0.08);
      backdrop-filter: blur(8px);
      margin-top: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
      color: var(--muted);
    }
    input[type="text"],
    input[type="url"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font: inherit;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--line);
    }
    .status {
      min-height: 1.4em;
      margin-top: 12px;
      color: var(--muted);
    }
    .status.error { color: var(--warn); }
    .status.ok { color: var(--ok); }
    .inline {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: var(--ink);
    }
    .preview {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <a href="/app">Back to app</a>
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
        <a href="/admin">Admin</a>
        <button id="logout" class="secondary" type="button">Log out</button>
      </div>
    </div>

    <h1>Author Profile Editor</h1>
    <p class="lede">This is the working profile editor for authors and admins. It controls the public author page, social links, and the hand-picked featured content list.</p>

    <section class="card">
      <div class="grid">
        <label>
          Display name
          <input id="displayName" type="text" />
        </label>
        <label>
          Public slug
          <input id="slug" type="text" placeholder="mary-oliver" />
        </label>
        <label>
          Photo URL
          <input id="photoUrl" type="url" />
        </label>
        <label>
          Website URL
          <input id="websiteUrl" type="url" />
        </label>
        <label>
          Instagram URL
          <input id="instagramUrl" type="url" />
        </label>
        <label>
          TikTok URL
          <input id="tiktokUrl" type="url" />
        </label>
        <label>
          YouTube URL
          <input id="youtubeUrl" type="url" />
        </label>
        <label>
          Newsletter URL
          <input id="newsletterUrl" type="url" />
        </label>
        <label>
          Bookstore URL
          <input id="bookstoreUrl" type="url" />
        </label>
        <label>
          Short bio
          <textarea id="shortBio" style="min-height:90px;"></textarea>
        </label>
      </div>

      <label style="margin-top:16px;">
        Full bio
        <textarea id="bio"></textarea>
      </label>

      <div class="grid" style="margin-top:16px;">
        <label>
          Author name variants
          <textarea id="authorNameVariants" placeholder="One per line or comma separated"></textarea>
        </label>
        <label>
          Featured content IDs
          <textarea id="featuredContentIds" placeholder="One per line or comma separated"></textarea>
        </label>
      </div>

      <label style="margin-top:16px;" class="inline">
        <input id="published" type="checkbox" />
        Published on public author page
      </label>

      <div class="actions">
        <button id="save" type="button">Save profile</button>
        <a id="preview-link" class="preview" href="#" target="_blank" rel="noopener" style="display:none;">Open public profile</a>
      </div>
      <div id="status" class="status">Loading profile…</div>
    </section>
  </main>

  <script>
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDhDlg_3VjDTfamRvjcsguqMaiFS3DogT8",
      authDomain: "poetry-please.firebaseapp.com",
      projectId: "poetry-please",
      storageBucket: "poetry-please.appspot.com",
      messagingSenderId: "609992589187",
      appId: "1:609992589187:web:ea8aed51a08c3716b880b6",
      measurementId: "G-FBLJHKQ70B"
    };
    firebase.initializeApp(FIREBASE_CONFIG);

    const state = { me: null, profile: null };

    function setStatus(message, kind = "") {
      const el = document.getElementById("status");
      el.textContent = message;
      el.className = `status${kind ? ` ${kind}` : ""}`;
    }

    async function getIdTokenOrNull() {
      const user = firebase.auth().currentUser;
      return user ? await user.getIdToken(false) : null;
    }

    async function api(path, { method = "GET", body } = {}) {
      const token = await getIdTokenOrNull();
      const res = await fetch(`/api/${path.replace(/^\//, "")}`, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
        },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) {
        const text = await res.text().catch(() => "");
        throw new Error(`API ${method} /api/${path} failed: ${res.status} ${text}`);
      }
      return res.json();
    }

    function splitList(value) {
      return String(value || "")
        .split(/[\n,]/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function fillProfile(profile = {}) {
      state.profile = profile;
      document.getElementById("displayName").value = profile.displayName || "";
      document.getElementById("slug").value = profile.slug || "";
      document.getElementById("photoUrl").value = profile.photoUrl || "";
      document.getElementById("websiteUrl").value = profile.websiteUrl || "";
      document.getElementById("instagramUrl").value = profile.instagramUrl || "";
      document.getElementById("tiktokUrl").value = profile.tiktokUrl || "";
      document.getElementById("youtubeUrl").value = profile.youtubeUrl || "";
      document.getElementById("newsletterUrl").value = profile.newsletterUrl || "";
      document.getElementById("bookstoreUrl").value = profile.bookstoreUrl || "";
      document.getElementById("shortBio").value = profile.shortBio || "";
      document.getElementById("bio").value = profile.bio || "";
      document.getElementById("authorNameVariants").value = (profile.authorNameVariants || []).join("\n");
      document.getElementById("featuredContentIds").value = (profile.featuredContentIds || []).join("\n");
      document.getElementById("published").checked = profile.published !== false;
      updatePreviewLink(profile.slug);
    }

    function updatePreviewLink(slug) {
      const link = document.getElementById("preview-link");
      if (!slug) {
        link.style.display = "none";
        link.href = "#";
        return;
      }
      link.href = `/author/${encodeURIComponent(slug)}`;
      link.style.display = "inline-block";
    }

    function collectPayload() {
      const payload = {
        displayName: document.getElementById("displayName").value.trim(),
        slug: document.getElementById("slug").value.trim(),
        photoUrl: document.getElementById("photoUrl").value.trim(),
        websiteUrl: document.getElementById("websiteUrl").value.trim(),
        instagramUrl: document.getElementById("instagramUrl").value.trim(),
        tiktokUrl: document.getElementById("tiktokUrl").value.trim(),
        youtubeUrl: document.getElementById("youtubeUrl").value.trim(),
        newsletterUrl: document.getElementById("newsletterUrl").value.trim(),
        bookstoreUrl: document.getElementById("bookstoreUrl").value.trim(),
        shortBio: document.getElementById("shortBio").value.trim(),
        bio: document.getElementById("bio").value.trim(),
        authorNameVariants: splitList(document.getElementById("authorNameVariants").value),
        featuredContentIds: splitList(document.getElementById("featuredContentIds").value),
        published: document.getElementById("published").checked,
      };
      return payload;
    }

    async function loadProfile() {
      const payload = await api("my/authorProfile", { method: "GET" });
      fillProfile(payload.profile || {});
      setStatus(payload.profile ? "Profile loaded." : "No profile yet. Fill this out to create one.");
    }

    async function saveProfile() {
      setStatus("Saving profile…");
      try {
        const payload = await api("authorProfiles", { method: "POST", body: collectPayload() });
        fillProfile(payload.profile || {});
        setStatus("Profile saved.", "ok");
      } catch (err) {
        console.error(err);
        setStatus(err.message || "Failed to save profile.", "error");
      }
    }

    async function init() {
      firebase.auth().onAuthStateChanged(async (user) => {
        if (!user) {
          setStatus("Please sign in first.", "error");
          return;
        }
        try {
          state.me = await api("me", { method: "GET" });
        } catch (err) {
          console.error(err);
          setStatus("Could not load account state.", "error");
          return;
        }
        if (!state.me?.roles?.some((role) => role === "author" || role === "admin")) {
          setStatus("You need author or admin access to edit author profiles.", "error");
          return;
        }
        await loadProfile();
      });

      document.getElementById("save").addEventListener("click", () => saveProfile());
      document.getElementById("slug").addEventListener("input", (event) => updatePreviewLink(event.target.value.trim()));
      document.getElementById("logout").addEventListener("click", async () => {
        await firebase.auth().signOut();
        location.href = "/app";
      });
    }

    init();
  </script>
</body>
</html>
