<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poetry, Please Embed</title>
  <link rel="icon" type="image/png" href="/pp-loader-logo.png" />
  <link rel="apple-touch-icon" href="/pp-loader-logo.png" />
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />
  <link rel="stylesheet" href="/style.css?v=20260320a"/>
  <style>
    html, body {
      background: #f7f1e5;
      color: #111;
      margin: 0;
    }
    .pp-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(47, 93, 98, 0.18), transparent 40%),
        linear-gradient(180deg, #faf7f0 0%, #f4ecdd 100%);
      opacity: 1;
      visibility: visible;
      transition: opacity 420ms ease, visibility 420ms ease;
    }
    .pp-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .pp-loader__mark {
      width: min(36vw, 180px);
      opacity: 0;
      transform: translateY(10px) scale(0.94);
      animation: ppLoaderFadeIn 900ms ease forwards;
    }
    .pp-loader__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .pp-loader__text {
      font: 600 14px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(30, 26, 21, 0.68);
    }
    .pp-loader__dots {
      display: inline-block;
      width: 3ch;
      text-align: left;
    }
    .pp-loader__dots::after {
      content: "";
      animation: ppLoaderDots 1.2s steps(4, end) infinite;
    }
    @keyframes ppLoaderFadeIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    @keyframes ppLoaderDots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75%, 100% { content: "..."; }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script>

  </script>
</head>
<body data-ui="embed">
  <div id="pp-loader" class="pp-loader" aria-hidden="true">
    <div class="pp-loader__content">
      <img class="pp-loader__mark" src="/pp-loader-logo.png?v=20260323b" alt="" decoding="async" />
      <div class="pp-loader__text">Loading<span class="pp-loader__dots" aria-hidden="true"></span></div>
    </div>
  </div>

  <div id="poetry-screen">
    <h1 id="page-title">Poetry, Please!</h1>

  </div>

  <script src="/app.js?v=20260414b"></script>
</body>
