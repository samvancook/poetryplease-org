<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poetry, Please</title>
  <link rel="stylesheet" href="/style.css"/>

  <!-- Firebase (compat) SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>

  <script>
    const AUTH_HOSTS = new Set([
      "poetry-please.web.app",
      "poetry-please.firebaseapp.com",
      "poetryplease-org.web.app",
      "poetryplease-org.firebaseapp.com",
      "poetryplease.org",
      "www.poetryplease.org"
    ]);
    const currentAuthHost = AUTH_HOSTS.has(window.location.hostname)
      ? window.location.hostname
      : "poetry-please.web.app";
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDhDlg_3VjDTfamRvjcsguqMaiFS3DogT8",
      authDomain: currentAuthHost,
      projectId: "poetry-please",
      storageBucket: "poetry-please.appspot.com",
      messagingSenderId: "609992589187",
      appId: "1:609992589187:web:ea8aed51a08c3716b880b6",
      measurementId: "G-FBLJHKQ70B"
    };
    firebase.initializeApp(FIREBASE_CONFIG);

    
  // 🔹 Analytics init (v8)
  const analytics = firebase.analytics();

  // 🔹 Explicit page view
  analytics.logEvent('page_view');
    
  </script>
</head>
<body>
  <div id="pp-build-tag"
     style="position:fixed; top:4px; right:6px; z-index:99999;
            font-size:10px; font-family:monospace;
            background:#000; color:#fff; padding:2px 5px;
            opacity:0.65; border-radius:4px;">
  Build: TEST-2
</div>

  <div id="user-status"></div>

  <div id="type-filter-container">
    <label for="type-filter">Filter by Image Type:</label>
    <select id="type-filter">
      <option value="">All Types</option>
    </select>
  </div>

  <div id="catalog-filter-container">
    <label for="catalog-filter">Filter by Release Catalog:</label>
    <select id="catalog-filter">
      <option value="">All Releases</option>
    </select>
  </div>

  <div id="login-screen">
    <h1>Welcome to Poetry, Please!</h1>
    <button id="login-google">Log in with Google</button>
    <form id="email-login-form">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Log in</button>
    </form>
    <button id="show-registration">Create an Account</button>
  </div>

  <div id="registration-screen" style="display:none">
    <h1>Create an Account</h1>
    <form id="registration-form">
      <input type="email" id="reg-email" placeholder="Email" required />
      <input type="password" id="reg-password" placeholder="Password" required />
      <button type="submit">Sign Up</button>
    </form>
    <button id="show-login">Back to Login</button>
  </div>

  <div id="poetry-screen" style="display:none">
    <h1 id="page-title">Poetry, Please!</h1>
    <div class="button-container">
      <button id="load-button" disabled>Poetry, Please</button>
    </div>
    <div id="error" class="error"></div>
    <div id="message" class="message"></div>
    <div id="gallery" class="gallery"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
