<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poetry Please</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
  <style>
    #gallery img {
      max-width: 100%;
      height: auto;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>Poetry Please - Image Gallery</h1>
  <div id="gallery">
    <p>Loading images...</p>
  </div>
  <script>
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDhDlg_3VjDTfamRvjcsguqMaiFS3DogT8",
      authDomain: "poetry-please.firebaseapp.com",
      projectId: "poetry-please", // Confirm this is the correct project ID
      storageBucket: "poetrypleasebucket.appspot.com", // Correct bucket name
      messagingSenderId: "609992589187",
      appId: "1:609992589187:web:ea8aed51a08c3716b880b6",
      measurementId: "G-FBLJHKQ70B"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    // Firestore and Storage references
    const db = firebase.firestore();
    const storage = firebase.storage();

    // Function to load and display images
    async function loadImages() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '<p>Loading images...</p>';

      try {
        // Fetch image metadata from Firestore
        console.log("Attempting to fetch images from Firestore...");
        const snapshot = await db.collection('graphics').get();

        if (snapshot.empty) {
          gallery.innerHTML = '<p>No images found in Firestore.</p>';
          console.warn("The 'graphics' collection is empty.");
          return;
        }

        const imageElements = [];
        for (const doc of snapshot.docs) {
          const data = doc.data();
          console.log("Document data:", data);

          if (data.url) {
            // Use Firestore URL if available
            imageElements.push(`<img src="${data.url}" alt="${data.title || 'Image'}">`);
          } else if (data.storagePath) {
            // Fetch from Storage if 'storagePath' is provided
            try {
              const url = await storage.ref(data.storagePath).getDownloadURL();
              imageElements.push(`<img src="${url}" alt="${data.title || 'Image'}">`);
            } catch (storageError) {
              console.error(`Error fetching image from Storage for path ${data.storagePath}:`, storageError);
            }
          } else {
            console.warn(`Document ${doc.id} is missing 'url' or 'storagePath'.`);
          }
        }

        // Display images in the gallery
        gallery.innerHTML = imageElements.join('');
      } catch (firestoreError) {
        console.error("Error fetching images from Firestore:", firestoreError);
        gallery.innerHTML = '<p>Error loading images. Please check the console for details.</p>';
      }
    }

    // Load images on page load
    window.onload = loadImages;
  </script>
</body>
</html>
