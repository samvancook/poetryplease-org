<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poetry Please - Gallery</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
  <style>
    #gallery img {
      max-width: 100%;
      height: auto;
      margin: 10px;
    }
  </style>
</head>
<body>
  <h1>Poetry Please - Image Gallery</h1>
  <div id="gallery">
    <p>Loading images...</p>
  </div>
  <script>
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDhDlg_3VjDTfamRvjcsguqMaiFS3DogT8",
      authDomain: "poetry-please.firebaseapp.com",
      projectId: "poetry-please", // Confirm this matches your project ID
      storageBucket: "poetrypleasebucket.appspot.com", // Correct bucket name
      messagingSenderId: "609992589187",
      appId: "1:609992589187:web:ea8aed51a08c3716b880b6",
      measurementId: "G-FBLJHKQ70B"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    // Firestore and Storage references
    const db = firebase.firestore();
    const storage = firebase.storage();

    // Use `poetrypleasedatabase` instead of the default `(default)`
    db.settings({
      host: "firestore.googleapis.com",
      ssl: true
    });

    // Function to load and display images
    async function loadImages() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '<p>Loading images...</p>';

      try {
        console.log("Fetching images from Firestore...");
        const snapshot = await db.collection("graphics").get();

        if (snapshot.empty) {
          gallery.innerHTML = '<p>No images found.</p>';
          console.warn("No documents in 'graphics' collection.");
          return;
        }

        const imageElements = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          console.log("Document data:", data);

          if (data.url) {
            imageElements.push(`<img src="${data.url}" alt="${data.title || 'Image'}">`);
          } else if (data.storagePath) {
            const storageRef = storage.ref(data.storagePath);
            storageRef.getDownloadURL().then(url => {
              imageElements.push(`<img src="${url}" alt="${data.title || 'Image'}">`);
              gallery.innerHTML = imageElements.join('');
            }).catch(error => {
              console.error("Error fetching image from Storage:", error);
            });
          } else {
            console.warn(`Document ${doc.id} is missing 'url' or 'storagePath'.`);
          }
        });

        gallery.innerHTML = imageElements.join('');
      } catch (error) {
        console.error("Error fetching Firestore data:", error);
        gallery.innerHTML = '<p>Error loading images. Check the console for details.</p>';
      }
    }

    // Load images on page load
    window.onload = loadImages;
  </script>
</body>
</html>
