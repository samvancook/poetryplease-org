<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poetry Please - Image Gallery</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <style>
    /* Style for the gallery */
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 10px;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
    .card img {
      max-width: 100%;
      height: auto;
      border-radius: 5px;
    }
    .card p {
      margin: 5px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Poetry Please - Image Gallery</h1>
  <div id="gallery">
    <p>Loading images...</p>
  </div>
  <script>
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDhDlg_3VjDTfamRvjcsguqMaiFS3DogT8",
      authDomain: "poetry-please.firebaseapp.com",
      projectId: "poetry-please",
      storageBucket: "poetrypleasebucket.appspot.com",
      messagingSenderId: "609992589187",
      appId: "1:609992589187:web:ea8aed51a08c3716b880b6",
      measurementId: "G-FBLJHKQ70B"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    // Firestore reference
    const db = firebase.firestore();

    // Function to load and display images
    async function loadImages() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '<p>Loading images...</p>';

      try {
        // Fetch 'graphics' collection from Firestore
        const snapshot = await db.collection('graphics').get();
        if (snapshot.empty) {
          gallery.innerHTML = '<p>No images found in Firestore.</p>';
          console.warn("The 'graphics' collection is empty.");
          return;
        }

        // Prepare HTML for each document
        const cards = snapshot.docs.map(doc => {
          const data = doc.data();
          return `
            <div class="card">
              <img src="${data.imageUrl}" alt="${data.title || 'Image'}">
              <p><strong>${data.title || 'Untitled'}</strong></p>
              <p>Author: ${data.author || 'Unknown'}</p>
              <p>Book: ${data.book || 'Unknown'}</p>
              <p>Release: ${data.releaseCatalog || 'Unknown'}</p>
              <a href="${data.driveLink}" target="_blank">Buy the Book</a>
            </div>
          `;
        });

        // Display the cards in the gallery
        gallery.innerHTML = cards.join('');
      } catch (error) {
        console.error("Error loading images:", error);
        gallery.innerHTML = '<p>Error loading images. Please check the console for details.</p>';
      }
    }

    // Load images on page load
    window.onload = loadImages;
  </script>
</body>
</html>
