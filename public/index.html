<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poetry, Please</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />
  <link rel="stylesheet" href="/style.css?v=20260320a"/>
  <style>
    html, body {
      background: #faf7f0;
      color: #111;
    }
    .pp-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(47, 93, 98, 0.22), transparent 40%),
        linear-gradient(180deg, #faf7f0 0%, #f4ecdd 100%);
      opacity: 1;
      visibility: visible;
      transition: opacity 420ms ease, visibility 420ms ease;
    }
    .pp-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .pp-loader__mark {
      width: min(46vw, 220px);
      opacity: 0;
      transform: translateY(10px) scale(0.94);
      animation: ppLoaderFadeIn 900ms ease forwards;
      filter: drop-shadow(0 18px 32px rgba(30, 26, 21, 0.14));
    }
    .pp-loader__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .pp-loader__text {
      font: 600 14px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(30, 26, 21, 0.68);
    }
    .pp-loader__dots {
      display: inline-block;
      width: 3ch;
      text-align: left;
    }
    .pp-loader__dots::after {
      content: "";
      animation: ppLoaderDots 1.2s steps(4, end) infinite;
    }
    @keyframes ppLoaderFadeIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    @keyframes ppLoaderDots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75%,
      100% { content: "..."; }
    }
  </style>

  <!-- Firebase (compat) SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>

  <script>
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDhDlg_3VjDTfamRvjcsguqMaiFS3DogT8",
      authDomain: "poetry-please.firebaseapp.com",
      projectId: "poetry-please",
      storageBucket: "poetry-please.firebasestorage.app",
      messagingSenderId: "609992589187",
      appId: "1:609992589187:web:ea8aed51a08c3716b880b6",
      measurementId: "G-FBLJHKQ70B"
    };
    firebase.initializeApp(FIREBASE_CONFIG);
    window.addEventListener('load', () => {
      const loadAnalytics = () => {
        const script = document.createElement('script');
        script.src = 'https://www.gstatic.com/firebasejs/10.14.0/firebase-analytics-compat.js';
        script.async = true;
        script.onload = () => {
          try {
            firebase.analytics().logEvent('page_view');
          } catch (err) {
            console.warn('Analytics init skipped', err);
          }
        };
        document.head.appendChild(script);
      };

      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadAnalytics, { timeout: 2000 });
      } else {
        setTimeout(loadAnalytics, 800);
      }
    }, { once: true });
  </script>
</head>
<body>
  <div id="pp-loader" class="pp-loader" aria-hidden="true">
    <div class="pp-loader__content">
      <img class="pp-loader__mark" src="/pp-loader-logo.png?v=20260323b" alt="" decoding="async" />
      <div class="pp-loader__text">Loading<span class="pp-loader__dots" aria-hidden="true"></span></div>
    </div>
  </div>
  <div id="user-status"></div>

  <div id="type-filter-container">
    <label for="type-filter">Filter by Image Type:</label>
    <select id="type-filter">
      <option value="">All Types</option>
    </select>
  </div>

  <div id="catalog-filter-container">
    <label for="catalog-filter">Filter by Release Catalog:</label>
    <select id="catalog-filter">
      <option value="">All Releases</option>
    </select>
  </div>

  <div id="login-screen" style="display:none">
    <h1>Welcome to Poetry, Please!</h1>
    <button id="login-google">Log in with Google</button>
    <form id="email-login-form">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Log in</button>
    </form>
    <button id="show-registration">Create an Account</button>
  </div>

  <div id="registration-screen" style="display:none">
    <h1>Create an Account</h1>
    <form id="registration-form">
      <input type="email" id="reg-email" placeholder="Email" required />
      <input type="password" id="reg-password" placeholder="Password" required />
      <button type="submit">Sign Up</button>
    </form>
    <button id="show-login">Back to Login</button>
  </div>

  <div id="poetry-screen">
    <h1 id="page-title">Poetry, Please!</h1>
    <div class="button-container">
      <button id="load-button" disabled>Poetry, Please</button>
    </div>
    <div id="error" class="error"></div>
    <div id="message" class="message"></div>
    <div id="gallery" class="gallery"></div>
  </div>

  <script src="/app.js?v=20260326b"></script>
</body>
</html>
