<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Poetry, Please — Mobile</title>

  <style>
    :root {
      --pad: 14px;
      --radius: 14px;
      --shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; background:#fff; color:#111; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    body {
      /* leave bottom space for sticky controls; includes iOS safe-area */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 72px) env(safe-area-inset-left);
    }
    .wrap { max-width: 640px; margin: 0 auto; padding: var(--pad); }

    header { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    header h1 { font-size:18px; margin:0; font-weight:600; }
    header .status { font-size:12px; opacity:.75; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Media area */
    .media-outer { margin-top: 10px; position: relative; } /* positioning context for the info button */
    #media-wrap { border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); background:#fafafa; }
    #media-wrap .media-box { margin:0; }
    #media-wrap img, #media-wrap video {
      width:100%; height:auto; max-height: 70vh; object-fit: contain; display:block;
    }
    @media (orientation:landscape) {
      #media-wrap img, #media-wrap video { max-height: 65vh; }
    }

    /* Counters badge */
    .row { display:flex; align-items:center; gap:8px; margin-top: 10px; }
    .badge { padding:8px 10px; border:1px solid #eee; border-radius:12px; font-size:14px; background:#fff; box-shadow: var(--shadow); }

    /* Sticky bottom button bar */
    .sticky-controls {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
      padding: 10px env(safe-area-inset-right) calc(10px + env(safe-area-inset-bottom)) env(safe-area-inset-left);
      background: linear-gradient(180deg, rgba(255,255,255,0) 0%, #ffffff 30%);
      display:flex; gap:10px; justify-content: center;
    }
    .controls { display:flex; gap:10px; width: min(640px, 100%); margin: 0 auto; }
    .controls button {
      flex:1; padding:14px 12px; border-radius: var(--radius);
      border:1px solid #e6e6e6; background:#f7f7f7; font-size:16px; line-height:1.1;
      touch-action: manipulation; box-shadow: var(--shadow);
    }
    .controls button:active { transform: translateY(1px); }
    .controls button:disabled { opacity:.45; }

    /* Hide desktop-only chrome if it ever leaks in */
    #counters-bar, .top-bar { display:none !important; }

    #message { min-height: 1.2em; margin-top: 6px; font-size:14px; color:#0a7e22; }
  </style>

  <!-- Firebase (compat) SDKs to match index.html -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script>
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDhDlg_3VjDTfamRvjcsguqMaiFS3DogT8",
      authDomain: "poetry-please.web.app",
      projectId: "poetry-please",
      storageBucket: "poetry-please.appspot.com",
      messagingSenderId: "609992589187",
      appId: "1:609992589187:web:ea8aed51a08c3716b880b6",
      measurementId: "G-FBLJHKQ70B"
    };
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  </script>
  <link rel="stylesheet" href="/mobile.css" />
</head>
<body data-ui="mobile">
  <div class="wrap">
    <header>
      <h1>Poetry, Please</h1>
      <div class="status" id="mobile-login-status">Loading…</div>
      <button id="mobile-google"
              style="font-size:12px;padding:6px 10px;border:1px solid #e6e6e6;
                     border-radius:10px;background:#f7f7f7;">
        Sign in with Google
      </button>
    </header>

    <div class="media-outer">
      <!-- app.js will render into #media-wrap -->
      <div id="media-wrap"></div>

      <!-- Floating info button (top-left, over image) -->
      <button class="info-btn" aria-label="Show info"
              onclick="window.PP && window.PP.toggleInfo(true)">i</button>
    </div>

    <div class="row">
      <div class="badge" id="mobile-counts">Likes: 0 • Dislikes: 0 • Skips: 0</div>
    </div>

    <!-- Needed elements that app.js expects but we’ll keep out of sight -->
    <div id="gallery" style="display:none"></div>
    <div id="message" class="message"></div>
    <div id="error" class="error" style="display:none"></div>
  </div>

  <!-- Force mobile mode in app.js and (optionally) hide the corner badge -->
  <script>
    window.__PP_FORCE_MOBILE = true;
    // window.__PP_HIDE_BADGE = true; // uncomment to hide the debug badge
  </script>
  <script src="/app.js" defer></script>

  <!-- Ensure mobile controls are visible + mounted even if something interferes -->
  <style>
    /* Force the sticky controls to show on top of everything */
    .sticky-controls { display: block !important; z-index: 9999 !important; }
    .sticky-controls .controls { display: flex !important; gap: 10px; }
    .sticky-controls .controls button { display: inline-block !important; }
  </style>

  <script>
    (function ensureMobileControls(){
      function mount() {
        if (document.getElementById('btnSkip')) return; // already mounted

        const bar = document.createElement('div');
        bar.className = 'sticky-controls';
        bar.innerHTML = `
          <div class="controls">
            <button id="btnBack">Go Back</button>
            <button id="btnBook">Take me to the book</button>
            <button id="btnLike">Like</button>
            <button id="btnDislike">Dislike</button>
            <button id="btnSkip">Poetry, Please</button>
          </div>
        `;
        document.body.appendChild(bar);

        const $ = (s) => document.querySelector(s);
        $('#btnBack')   ?.addEventListener('click', () => (window.PP?.goBack?.() || window.onGoBack?.()));
        $('#btnBook')   ?.addEventListener('click', () => (window.PP?.openBook?.()));
        $('#btnLike')   ?.addEventListener('click', () => (window.PP?.vote?.('like')     || window.onVoteAny?.('like')));
        $('#btnDislike')?.addEventListener('click', () => (window.PP?.vote?.('dislike')  || window.onVoteAny?.('dislike')));
        $('#btnSkip')   ?.addEventListener('click', () => (window.PP?.skip?.()           || window.onSkip?.()));
      }

      // Mount as soon as DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', mount, { once: true });
      } else {
        mount();
      }

      // If app.js re-renders and something removes the bar, put it back
      window.addEventListener('pp:state', () => {
        if (!document.getElementById('btnSkip')) mount();
      }, { passive: true });
    })();
  </script>

  <script>
    // Attach Google Sign-In for mobile — uses the same signInWithGoogle() from app.js
    window.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('mobile-google');
      if (!btn) return;
      btn.addEventListener('click', () => {
        if (typeof signInWithGoogle === 'function') {
          signInWithGoogle();  // this triggers redirect flow on mobile
        } else {
          alert('Sign-in not ready yet — please try again in a moment.');
        }
      });
    });
  </script>

  <script>
    // Make buttons work even if app.js didn’t inject window.PP
    window.PP = {
      vote:  (v) => (window.onVoteAny ? onVoteAny(v) : console.warn('onVoteAny missing')),
      skip:  ()  => (window.onSkip ? onSkip() : console.warn('onSkip missing')),
      goBack:()  => (window.onGoBack ? onGoBack() : console.warn('onGoBack missing')),
      openBook: () => { if (window.currentItem?.bookUrl) window.open(window.currentItem.bookUrl, '_blank','noopener,noreferrer'); },
      getState: () => ({ user: (firebase?.auth?.().currentUser || null) })
    };

    // Define the popout toggler (JS-driven)
    window.PP.toggleInfo = (open) => {
      const el = document.getElementById('pp-info');
      if (el) el.dataset.open = open ? 'true' : 'false';
    };

    // Auto-start one item on mobile if nothing has rendered yet
    setTimeout(() => { if (!window.currentItem && window.onSkip) onSkip(); }, 800);

    // Minimal on-screen error box so you can see runtime errors on phone
    (function(){
      const box = document.createElement('div');
      box.style.cssText='position:fixed;left:8px;bottom:8px;max-width:90vw;background:#fee;border:1px solid #f99;border-radius:8px;padding:6px 8px;font:12px system-ui;z-index:99999;display:none';
      document.body.appendChild(box);
      const show = (msg)=>{ box.textContent = msg; box.style.display = 'block'; };
      window.addEventListener('error', e => show('JS error: ' + (e.message || e)));
      window.addEventListener('unhandledrejection', e => show('Promise: ' + (e.reason?.message || e.reason || e)));
    })();
  </script>

  <!-- JS-driven bottom-sheet popout -->
  <div id="pp-info" data-open="false" aria-hidden="true">
    <div class="pp-info__backdrop" onclick="window.PP && window.PP.toggleInfo(false)"></div>
    <section class="pp-info__sheet" role="dialog" aria-modal="true" aria-labelledby="pp-info-title">
      <header class="pp-info__header">
        <h2 id="pp-info-title">Info</h2>
        <button class="pp-info__close" aria-label="Close" onclick="window.PP && window.PP.toggleInfo(false)">✕</button>
      </header>

      <div class="pp-info__body">
        <div class="pp-info__meta">
          <div><span class="pp-info__label">Book</span><span id="info-book">—</span></div>
          <div><span class="pp-info__label">Poem</span><span id="info-title">—</span></div>
          <div><span class="pp-info__label">Author</span><span id="info-author">—</span></div>
        </div>

        <div class="pp-info__filters">
          <label class="pp-info__check">
            <input type="checkbox" id="info-filter-author" />
            More from this author
          </label>
          <label class="pp-info__check">
            <input type="checkbox" id="info-filter-book" />
            More from this book
          </label>
        </div>

        <div class="pp-info__counters" id="info-counters">—</div>
      </div>
    </section>
  </div>
</body>
</html>
