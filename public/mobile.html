<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Poetry, Please — Mobile</title>

  <style>
    :root { --pad:14px; --radius:14px; --shadow:0 2px 10px rgba(0,0,0,.06); }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#fff;color:#111;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    body{padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 72px) env(safe-area-inset-left)}
    .wrap{max-width:640px;margin:0 auto;padding:var(--pad)}
    header{display:flex;align-items:center;justify-content:space-between;gap:10px}
    header h1{font-size:18px;margin:0;font-weight:600}
    header .status{font-size:12px;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .media-outer{margin-top:10px;position:relative}
    #media-wrap{border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);background:#fafafa}
    #media-wrap img,
    #media-wrap video {
      width: 100%;
      height: calc(100svh - 200px);  /* header + gaps + sticky controls */
      max-height: calc(100svh - 200px);
      object-fit: contain;
      display: block;
      background: #000;
    }
    
    @media (orientation:landscape){
      #media-wrap img, #media-wrap video {
        max-height: calc(100svh - 200px);
      }
    }

    @media(orientation:landscape){#media-wrap img,#media-wrap video{max-height:65vh}}
    .row{display:flex;align-items:center;gap:8px;margin-top:10px}
    .badge{padding:8px 10px;border:1px solid #eee;border-radius:12px;font-size:14px;background:#fff;box-shadow:var(--shadow)}
    #counters-bar,.top-bar{display:none!important}

    /* Floating "i" button */
    .info-btn{position:absolute;left:8px;top:8px;width:32px;height:32px;border-radius:50%;
      border:1px solid #e6e6e6;background:#fff;box-shadow:var(--shadow);font-weight:700}

    /* Sticky bottom controls */
    .sticky-controls{position:fixed;left:0;right:0;bottom:0;z-index:9999;
      padding:10px env(safe-area-inset-right) calc(10px + env(safe-area-inset-bottom)) env(safe-area-inset-left);
      background:linear-gradient(180deg,rgba(255,255,255,0) 0%,#fff 30%);display:flex;justify-content:center}
    .controls{display:flex;gap:10px;width:min(640px,100%);margin:0 auto}
    .controls button{flex:1;padding:14px 12px;border-radius:var(--radius);border:1px solid #e6e6e6;background:#f7f7f7;font-size:16px;line-height:1.1;touch-action:manipulation;box-shadow:var(--shadow)}
    .controls button:active{transform:translateY(1px)}
    .controls button:disabled{opacity:.45}

    /* Hide any inline meta on mobile (we'll show it in the sheet instead) */
    body[data-ui="mobile"] .inline-info,
    body[data-ui="mobile"] .meta,
    body[data-ui="mobile"] .details,
    body[data-ui="mobile"] .caption,
    body[data-ui="mobile"] #title,
    body[data-ui="mobile"] #author,
    body[data-ui="mobile"] #book,
    body[data-ui="mobile"] #poem-title,
    body[data-ui="mobile"] #poem-author{display:none!important}

    /* Bottom-sheet styles */
    #pp-info{position:fixed;inset:0;z-index:10000;pointer-events:none}
    #pp-info[data-open="true"]{pointer-events:auto}
    .pp-info__backdrop{position:absolute;inset:0;background:rgba(0,0,0,.25);opacity:0;transition:.2s}
    #pp-info[data-open="true"] .pp-info__backdrop{opacity:1}
    .pp-info__sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:20px 20px 0 0;
      box-shadow:0 -8px 30px rgba(0,0,0,.15);transform:translateY(110%);transition:.25s;padding:16px}
    #pp-info[data-open="true"] .pp-info__sheet{transform:translateY(0)}
    .pp-info__header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .pp-info__header h2{margin:0;font-size:16px}
    .pp-info__close{border:0;background:#f2f2f2;border-radius:10px;padding:6px 10px}
    .pp-info__meta{display:grid;grid-template-columns:auto 1fr;gap:8px 10px;font-size:14px;margin:8px 0}
    .pp-info__label{opacity:.7}
    .pp-info__check{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:14px}
    .pp-info__counters{margin-top:8px;font-size:14px;opacity:.9}

    body[data-ui="mobile"] #mobile-counts { display: none !important; }

  </style>

  <!-- Firebase (compat) SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script>
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDhDlg_3VjDTfamRvjcsguqMaiFS3DogT8",
      authDomain: "poetry-please.web.app",
      projectId: "poetry-please",
      storageBucket: "poetry-please.appspot.com",
      messagingSenderId: "609992589187",
      appId: "1:609992589187:web:ea8aed51a08c3716b880b6",

    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);

</head>
<body data-ui="mobile">
  <div class="wrap">
    <header>
      <h1>Poetry, Please</h1>
      <div class="status" id="mobile-login-status">Loading…</div>
      <button id="mobile-google" style="font-size:12px;padding:6px 10px;border:1px solid #e6e6e6;border-radius:10px;background:#f7f7f7;">
        Sign in with Google
      </button>
    </header>

    <div class="media-outer">
      <div id="media-wrap"></div>
      <button class="info-btn" aria-label="Show info" onclick="window.PP.toggleInfo(true)">i</button>
    </div>

    <div class="row"><div class="badge" id="mobile-counts">Likes: 0 • Dislikes: 0 • Skips: 0</div></div>

    <!-- elements app.js expects but we keep hidden -->
    <div id="gallery" style="display:none"></div>
    <div id="message" class="message"></div>
    <div id="error" class="error" style="display:none"></div>
  </div>

  <!-- Bottom-sheet -->
  <div id="pp-info" data-open="false" aria-hidden="true">
    <div class="pp-info__backdrop" onclick="window.PP.toggleInfo(false)"></div>
    <section class="pp-info__sheet" role="dialog" aria-modal="true" aria-labelledby="pp-info-title">
      <header class="pp-info__header">
        <h2 id="pp-info-title">Info</h2>
        <button class="pp-info__close" aria-label="Close" onclick="window.PP.toggleInfo(false)">✕</button>
      </header>

      <div class="pp-info__body">
        <div class="pp-info__meta">
          <div class="pp-info__label">Book</div><div id="info-book">—</div>
          <div class="pp-info__label">Poem</div><div id="info-title">—</div>
          <div class="pp-info__label">Author</div><div id="info-author">—</div>
        </div>

        <div class="pp-info__filters">
          <label class="pp-info__check"><input type="checkbox" id="info-filter-author"/> More from this author</label>
          <label class="pp-info__check"><input type="checkbox" id="info-filter-book"/> More from this book</label>
        </div>

        <div class="pp-info__counters" id="info-counters">—</div>
      </div>
    </section>
  </div>

  <!-- Force mobile mode for app.js and load it -->
  <script>window.__PP_FORCE_MOBILE = true;</script>
  <script src="/app.js" defer></script>

  <!-- One tiny script to wire everything -->
  <script>
  (function(){
    /* ---------- Auth: use popup if allowed, else redirect (fixes COOP) ---------- */
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    async function signInWithGoogle() {
      try { await auth.signInWithPopup(provider); }
      catch (e) { try { await auth.signOut(); } catch{} await auth.signInWithRedirect(provider); }
    }
    auth.getRedirectResult().catch(console.error); // complete redirect if returning

    document.getElementById('mobile-google')?.addEventListener('click', signInWithGoogle);
    auth.onAuthStateChanged(u=>{
      document.getElementById('mobile-login-status').textContent = u ? (u.email || 'Signed in') : 'Signed out';
    });

    /* ---------- Minimal PP surface so buttons always work ---------- */
    const PP = (window.PP = Object.assign({}, window.PP));
    PP.vote    = PP.vote    || (v => window.onVoteAny ? onVoteAny(v) : null);
    PP.skip    = PP.skip    || (() => window.onSkip ? onSkip() : null);
    PP.goBack  = PP.goBack  || (() => window.onGoBack ? onGoBack() : null);
    PP.openBook= PP.openBook|| (() => { if (window.currentItem?.bookUrl) window.open(window.currentItem.bookUrl,'_blank','noopener,noreferrer'); });

    PP.toggleInfo = function(open){
  const el = document.getElementById('pp-info');
  if (!el) return;

  if (open) {
    // Update immediately and again on the next tick in case the item just changed.
    PP.updateInfo(window.currentItem);
    setTimeout(() => PP.updateInfo(window.currentItem), 0);
  }
  el.dataset.open = open ? 'true' : 'false';
};


    function pick(o, keys, fb){ if(!o) return fb; for(const k of keys){const v=o[k]; if(v!=null && String(v).trim()!=='') return v;} return fb; }
    function setTxt(id,v){ const el=document.getElementById(id); if(el) el.textContent=(v&&String(v).trim())||'—'; }

    PP.updateInfo = function(item){
      item = item || window.currentItem || {};
      setTxt('info-book',   pick(item,['book','bookTitle','collection','series'], null));
      setTxt('info-title',  pick(item,['title','poemTitle','name'], null));
      setTxt('info-author', pick(item,['author','authorName','writer'], null));
      const likes    = pick(item,['likes','likeCount'],0) ?? 0;
      const dislikes = pick(item,['dislikes','dislikeCount'],0) ?? 0;
      const skips    = pick(item,['skips','skipCount'],0) ?? 0;
      const c=document.getElementById('info-counters'); if(c) c.textContent=`Likes: ${likes} • Dislikes: ${dislikes} • Skips: ${skips}`;
    };

    window.addEventListener('pp:state', (e) => {
  // grab the item from the event and expose it globally for the pop-out
  const itm = e?.detail?.item || e?.detail?.current || e?.detail || null;
  if (itm) window.currentItem = itm;

  // update the bottom sheet now that we have the item
  PP.updateInfo(window.currentItem);
}, { passive: true });

    /* ---------- Sticky control bar ---------- */
    function mountControls(){
      if (document.getElementById('btnSkip')) return;
      const bar=document.createElement('div');
      bar.className='sticky-controls';
      bar.innerHTML=`
        <div class="controls">
          <button id="btnBack">Go Back</button>
          <button id="btnBook">Take me to the book</button>
          <button id="btnLike">Like</button>
          <button id="btnDislike">Dislike</button>
          <button id="btnSkip">Poetry, Please</button>
        </div>`;
      document.body.appendChild(bar);
      const $=s=>document.querySelector(s);
      $('#btnBack')?.addEventListener('click', ()=>PP.goBack());
      $('#btnBook')?.addEventListener('click', ()=>PP.openBook());
      $('#btnLike')?.addEventListener('click', ()=>PP.vote('like'));
      $('#btnDislike')?.addEventListener('click', ()=>PP.vote('dislike'));
      $('#btnSkip')?.addEventListener('click', ()=>PP.skip());
    }
    if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', mountControls, {once:true}); else mountControls();
    window.addEventListener('pp:state', ()=>{ if(!document.getElementById('btnSkip')) mountControls(); }, {passive:true});

    /* ---------- Filters in the sheet (optional pass-through) ---------- */
    document.getElementById('info-filter-author')?.addEventListener('change', e=>{
      if (PP.setFilter) PP.setFilter('author', !!e.target.checked); else window.PP_FILTER_AUTHOR = !!e.target.checked;
    });
    document.getElementById('info-filter-book')?.addEventListener('change', e=>{
      if (PP.setFilter) PP.setFilter('book', !!e.target.checked); else window.PP_FILTER_BOOK = !!e.target.checked;
    });

    /* Auto-start one item if nothing rendered yet */
    setTimeout(()=>{ if(!window.currentItem && window.onSkip) onSkip(); }, 800);
  })();
  </script>

 <!-- MOBILE QUICK FIX v3: remove EVERYTHING between header and media; fill bottom sheet -->
<script>
(function () {
  const PP = (window.PP = window.PP || {});
  const $  = (s, r=document) => r.querySelector(s);

  function extractFields(txt){
    const out = {};
    const grab = (re) => { const m = txt.match(re); return m ? m[1].trim() : null; };

    // flexible patterns
    out.title  = grab(/^\s*(?:Poem|Title)\s*:\s*(.+)$/im) || null;
    out.author = grab(/^\s*Author\s*:\s*(.+)$/im) || null;
    out.book   = grab(/^\s*(?:their|the)?\s*book\s*:\s*(.+)$/im)
              || grab(/from\s+(?:the|their)?\s*book\s*:\s*(.+)$/im)
              || null;

    // counters: "Likes: N • Dislikes: M • Skips: K"
    const c = txt.match(/Likes:\s*(\d+).*?Dislikes:\s*(\d+).*?Skips:\s*(\d+)/i);
    if (c) out.counters = `Likes: ${c[1]} • Dislikes: ${c[2]} • Skips: ${c[3]}`;
    return out;
  }

  function setTxt(id, v){
    const el = document.getElementById(id);
    if (el && v != null && String(v).trim() !== '') el.textContent = String(v).trim();
  }

  function harvestAndPurge(){
    const wrap = $('.wrap'); if (!wrap) return;

    const kids = Array.from(wrap.children);
    const headerIdx = kids.findIndex(n => n.tagName === 'HEADER');
    const mediaIdx  = kids.findIndex(n => n.classList && n.classList.contains('media-outer'));
    if (headerIdx < 0 || mediaIdx < 0 || mediaIdx <= headerIdx + 0) return;

    const slice = kids.slice(headerIdx + 1, mediaIdx); // EVERYTHING between header and media

    // Scrape text from slice
    let combined = '';
    for (const el of slice) combined += '\n' + (el.innerText || el.textContent || '');

    const scraped = extractFields(combined);

    // Remove all nodes in slice
    for (const el of slice) el.remove();

    // Apply to bottom sheet (prefer currentItem values when present)
    const item = window.currentItem || {};
    const pick = (...vals) => vals.find(v => v != null && String(v).trim() !== '') || null;

    const book   = pick(item.book, item.bookTitle, item.collection, scraped.book);
    const title  = pick(item.title, item.poemTitle, item.name, scraped.title);
    const author = pick(item.author, item.authorName, item.writer, scraped.author);

    setTxt('info-book',   book   || '—');
    setTxt('info-title',  title  || '—');
    setTxt('info-author', author || '—');

    if (scraped.counters) {
      const c = document.getElementById('info-counters');
      if (c) c.textContent = scraped.counters;
    }
  }

  const oldUpdate = PP.updateInfo;
  PP.updateInfo = function(item){
    if (typeof oldUpdate === 'function') try { oldUpdate(item); } catch {}
    harvestAndPurge();
  };

  // Keep the zone clean if your app injects again
  const wrap = document.querySelector('.wrap');
  if (wrap) {
    new MutationObserver(() => harvestAndPurge())
      .observe(wrap, { childList: true, subtree: true });
  }

  // First pass
  setTimeout(() => PP.updateInfo(window.currentItem || {}), 100);
})();
</script>
